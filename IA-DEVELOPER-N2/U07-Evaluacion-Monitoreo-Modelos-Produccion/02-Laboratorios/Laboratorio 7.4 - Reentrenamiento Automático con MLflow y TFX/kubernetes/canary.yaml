apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: recommendation-api-vs
  namespace: ml-systems
spec:
  hosts:
  - recommendation-api
  http:
  - match:
    - headers:
        canary:
          exact: "true"
    route:
    - destination:
        host: recommendation-api
        subset: canary
      weight: 100
  - route:
    - destination:
        host: recommendation-api
        subset: stable
      weight: 90
    - destination:
        host: recommendation-api
        subset: canary
      weight: 10
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: recommendation-api-dr
  namespace: ml-systems
spec:
  host: recommendation-api
  subsets:
  - name: stable
    labels:
      version: v1
  - name: canary
    labels:
      version: v2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-api-canary
  namespace: ml-systems
  labels:
    app: recommendation-api
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-api
      version: v2
  template:
    metadata:
      labels:
        app: recommendation-api
        version: v2
    spec:
      containers:
      - name: recommendation-api
        image: recommendation-api:v2
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MODEL_PATH
          value: "/app/models/canary/recommendation_model"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service.ml-systems.svc.cluster.local:5000"
        - name: LOG_LEVEL
          value: "INFO"
        - name: IS_CANARY
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
          readOnly: true
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage-pvc
