global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'medical-classifier-monitor'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Configuración para la API de clasificación médica
  - job_name: 'medical-classifier-api'
    scrape_interval: 5s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service: 'medical-image-classifier'
          environment: 'production'
          team: 'ml-team'
    
  # Configuración para métricas de OpenTelemetry
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9464']
        labels:
          service: 'otel-collector'
          environment: 'production'

  # Configuración para métricas del sistema (Node Exporter)
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'node-exporter'
          environment: 'production'

  # Configuración para métricas de Docker (cAdvisor)
  - job_name: 'cadvisor'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'cadvisor'
          environment: 'production'

# Configuración de alertas
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

# Configuración de almacenamiento
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB
